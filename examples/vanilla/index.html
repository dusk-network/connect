<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Wallet — Connect Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div class="brandText">
          <div class="titleRow">
            <h1>Dusk Wallet</h1>
          </div>
          <div class="subtitle">Minimal connect button integration</div>
        </div>
      </div>


      <nav class="appMenu" aria-label="Examples">
        <a class="appMenuItem active" href="../vanilla/" data-icon="◐">Connect</a>
        <a class="appMenuItem" href="../discovery-demo/" data-icon="⎔">Discovery</a>
        <a class="appMenuItem" href="../dario-fsm/" data-icon="▲">Dario</a>
      </nav>

      <div class="topbarRight">
        <dusk-connect-button
          id="connectBtn"
          app-name="Connect Demo"
          variant="solid"
        ></dusk-connect-button>
      </div>
    </header>

    <main class="container">
      <section class="card" aria-label="Wallet status">
        <p class="eyebrow">Connect</p>
        <div class="row">
          <div class="k">Status</div>
          <div class="v" id="status">—</div>
        </div>
        <div class="row">
          <div class="k">Discovered Wallets</div>
          <div class="v" id="walletCount">—</div>
        </div>
        <div class="row">
          <div class="k">Selected Wallet</div>
          <div class="v" id="providerName">—</div>
        </div>
        <div class="row row-select">
          <label class="k" for="providerSelect">Wallet Picker</label>
          <select class="picker" id="providerSelect">
            <option value="">Choose wallet</option>
          </select>
        </div>
        <div class="row">
          <div class="k">Account</div>
          <div class="v mono" id="account">—</div>
        </div>
        <div class="row">
          <div class="k">Chain</div>
          <div class="v mono" id="chainId">—</div>
        </div>
      </section>

      <a class="link" href="../dario-fsm/">Play the on-chain Dario demo →</a>
      <a class="link" href="../discovery-demo/">Open the mock multi-wallet discovery demo →</a>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
